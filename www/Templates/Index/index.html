{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landmania | 환영합니다</title>
    <link rel="stylesheet" href="{% static 'css/adminlte.min.css' %}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <style>
      .hero-section {
        padding: 100px 0;
        background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
        color: white;
        text-align: center;
      }
      .feature-box {
        padding: 40px 20px;
        text-align: center;
        border-radius: 10px;
        transition: transform 0.3s;
      }
      .feature-box:hover { transform: translateY(-10px); }
    </style>
  </head>

  <body class="layout-top-nav bg-light">
    <div class="wrapper">
      <nav class="main-header navbar navbar-expand-md navbar-light navbar-white shadow-sm">
        <div class="container">
          <a href="/" class="navbar-brand">
            <img src="{% static 'img/AdminLTELogo.png' %}" alt="Logo" class="brand-image img-circle opacity-80" style="width: 33px;">
            <span class="brand-text font-weight-light"><strong>Landmania</strong></span>
          </a>
          <div class="collapse navbar-collapse order-3" id="navbarCollapse">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="{% url 'AdminAccount:login_form' %}" class="btn btn-outline-primary me-2">로그인</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <main class="content-wrapper">
        <section class="hero-section">
          <div class="container">
            <h1 class="display-3 fw-bold">당신의 토지 관리를 더 스마트하게</h1>
            <p class="lead mb-5">Landmania는 대한민국 모든 토지 데이터를 한눈에 관리할 수 있는 최적의 솔루션입니다.</p>
            <a href="{% url 'AdminAccount:login_form' %}" class="btn btn-light btn-lg px-5 shadow">지금 시작하기</a>
          </div>
        </section>

        <section class="py-5">
          <div class="container">
            <div class="row text-center">
              <div class="col-md-4">
                <div class="feature-box bg-white shadow-sm mb-4">
                  <i class="bi bi-geo-alt-fill text-primary display-4"></i>
                  <h3 class="mt-3">정확한 위치</h3>
                  <p class="text-muted">전국 모든 필지의 위치 데이터를 정확하게 제공합니다.</p>
                </div>
              </div>
              <div class="col-md-4">
                <div class="feature-box bg-white shadow-sm mb-4">
                  <i class="bi bi-graph-up-arrow text-success display-4"></i>
                  <h3 class="mt-3">실시간 통계</h3>
                  <p class="text-muted">가격 변동 및 거래 현황을 실시간 차트로 확인하세요.</p>
                </div>
              </div>
              <div class="col-md-4">
                <div class="feature-box bg-white shadow-sm mb-4">
                  <i class="bi bi-shield-lock-fill text-danger display-4"></i>
                  <h3 class="mt-3">강력한 보안</h3>
                  <p class="text-muted">당신의 소중한 데이터를 안전하게 보호합니다.</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="main-footer text-center py-4 bg-white border-top">
        <strong>Copyright &copy; 2026 Landmania.</strong> All rights reserved.
      </footer>
    </div>

    <script src="{% static 'js/adminlte.min.js' %}"></script>
  </body>
</html>
